function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function daysDiff(d1, d2) {
    const ms = new Date(d1) - new Date(d2);
    return Math.floor(ms / (1000 * 60 * 60 * 24));
}

function todayStr() {
    return new Date().toISOString().split('T')[0];
}

function generateId() {
    return Math.random().toString(36).substr(2, 9);

function makeArticle(id, title, source, date, content, wordsData) {
    return {

    makeArticle('a5_econ', 'Globalization and Economic Inequality',
        'Adapted from Journal of International Economics (Working Paper)', '2023-05-12',
        `The contemporary wave of economic globalization has generated aggregate prosperity while simultaneously exacerbating domestic inequality in developed nations. Standard trade theory predicts that liberalization benefits nations according to comparative advantage, yet empirical evidence reveals uneven distributional consequences. Manufacturing sectors in advanced economies have experienced substantial outsourcing pressure as multinational enterprises relocate production to jurisdictions with lower labor costs. This spatial reorganization of supply chains, while enhancing consumer welfare through reduced prices, has displaced established workforces and suppressed wage growth for non-college-educated labor. Economists debate whether compensatory redistribution mechanisms—trade adjustment assistance, wage insurance, or targeted retraining—can adequately offset these concentrated losses. Furthermore, speculative capital flows and currency fluctuations introduce volatility that complicates macroeconomic management. The challenge for policymakers lies not in reversing integration but in designing institutional frameworks that distribute gains more equitably without sacrificing productive efficiency.`,

    makeArticle('a6_bioethics', 'Ethical Frontiers in Genetic Engineering',
        'Adapted from The American Journal of Bioethics (Open Access)', '2023-06-18',
        `The advent of CRISPR-Cas9 genome editing has precipitated intense ethical deliberation regarding the boundaries of permissible human intervention in hereditary material. Somatic gene therapy, which modifies non-reproductive cells to treat disease, has garnered widespread consensus as a legitimate medical application. However, germline editing—altering DNA in sperm, eggs, or embryos—raises profound concerns because modifications become heritable and affect descendants. Critics emphasize the specter of genetic enhancement beyond therapeutic goals, potentially exacerbating social inequality through boutique biotechnology accessible only to the affluent. The principle of autonomy demands robust informed consent, yet future generations cannot authorize modifications to their genomes. Regulatory frameworks vary dramatically across jurisdictions, from permissive oversight in some regions to statutory prohibitions elsewhere. The scientific community continues to grapple with establishing responsible innovation pathways that respect human dignity while preserving research freedom.`,

class StorageManager {
    static getKey() { return CONFIG.STORAGE_KEY; }
    
    static load() {
        try {
            const raw = localStorage.getItem(this.getKey());
            if (!raw) return this.initDefault();
            const data = JSON.parse(raw);
            return this.migrate(data);
        } catch(e) {
            console.error('Storage load error:', e);
            return this.initDefault();
        }
    }
    
    static initDefault() {
        return {
            articles: PRESET_ARTICLES.map(a => ({...a})),
            words: PRESET_ARTICLES.flatMap(a => a.words.map(w => ({...w}))),
            studyState: null,
            stats: { mastered: 0, totalScore: 0 },
            settings: { apiKey: '', apiModel: 'deepseek-chat' },
            version: 1
        };
    }
    
    static migrate(data) {
        if (!data.articles) data.articles = [];
        if (!data.words) data.words = [];
        if (!data.stats) data.stats = { mastered: 0, totalScore: 0 };
        if (!data.settings) data.settings = { apiKey: '', apiModel: 'deepseek-chat' };
        PRESET_ARTICLES.forEach(preset => {
            if (!data.articles.find(a => a.id === preset.id)) {
                data.articles.push({...preset});
                data.words.push(...preset.words.map(w => ({...w})));
            }
        });
        return data;
    }
    
    static save(data) {
        localStorage.setItem(this.getKey(), JSON.stringify(data));
    }
    
    static exportData() {
        const data = this.load();
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `gre_backup_${todayStr()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    static importData(jsonStr) {
        const imported = JSON.parse(jsonStr);
        if (!imported.articles || !imported.words) throw new Error('Invalid backup format');
        this.save(imported);
        return imported;
    }
}

    renderStudy() {
        if (!this.studyState || this.studyState.articleId !== this.currentArticleId) {
            this.initStudyState(this.currentArticleId);
        }
        
        const state = this.studyState;
        const article = this.data.articles.find(a => a.id === state.articleId);
        const cycleNames = ['', '第一循环：认知建立', '第二循环：由义及形', '第三循环：由形及义'];
        const cycleColors = ['', 'cycle-1', 'cycle-2', 'cycle-3'];
        
        const queue = state.queue || [];
        const currentWordId = queue[0];
        
        if (!currentWordId && queue.length === 0) {
            if (state.cycle < 3) {
                this.advanceCycle();
                return this.renderStudy();
            } else {
                this.completeList();
                return '';
            }
        }
        
        const word = this.data.words.find(w => w.id === currentWordId);
        const progress = state.initialQueueLength > 0 
            ? Math.round(((state.initialQueueLength - queue.length) / state.initialQueueLength) * 100) 
            : 0;
        
        let content = '';
        
        if (state.mode === 'learning') {
            content = this.renderLearningCard(word, state.cycle);
        } else {
            content = this.renderTestCard(word, state.cycle, article);
        }
        
        return `
            <div class="fade-in max-w-3xl mx-auto">
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <button onclick="app.quitStudy()" class="text-sm text-slate-500 hover:text-slate-900 mb-1 flex items-center gap-1">
                            ← 退出并保存
                        </button>
                        <h2 class="text-xl font-bold text-slate-900">${article.title}</h2>
                    </div>
                    <div class="text-right">
                        <div class="inline-block px-3 py-1 rounded-full text-sm font-bold ${cycleColors[state.cycle]} mb-1">
                            ${cycleNames[state.cycle]}
                        </div>
                        <div class="text-sm text-slate-500">剩余 ${queue.length} / ${state.initialQueueLength}</div>
                    </div>
                </div>
                
                <div class="w-full bg-slate-200 rounded-full h-3 mb-8 overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-blue-500 via-amber-500 to-red-500 transition-all duration-500" style="width:${progress}%"></div>
                </div>
                
                ${content}
            </div>
        `;
    }

    generateOptions(word, article) {
        const articleWords = this.data.words.filter(w => w.articleId === article.id);
        const otherWords = articleWords.filter(w => w.id !== word.id);
        const shuffled = shuffle(otherWords);
        const distractors = shuffled.slice(0, 3).map(w => w.chineseDef);
        
        const finalDistractors = distractors.filter(d => d !== word.chineseDef);
        while (finalDistractors.length < 3) {
            const extra = shuffle(otherWords)[0];
            if (extra && extra.chineseDef !== word.chineseDef) {
                finalDistractors.push(extra.chineseDef);
            } else {
                finalDistractors.push('（其他释义）');
            }
        }
        
        return shuffle([word.chineseDef, ...finalDistractors.slice(0, 3)]);
    }
    
    renderReading() {
        const articleId = this.currentArticleId || this.data.articles[0]?.id;
        const article = this.data.articles.find(a => a.id === articleId);
        if (!article) return '<div class="text-center py-20 text-slate-500">暂无文章</div>';
        
        const wordMap = {};
        this.data.words.filter(w => w.articleId === articleId).forEach(w => {
            const base = w.word.toLowerCase();
            wordMap[base] = w.id;
            if (w.word.endsWith('s')) wordMap[base.slice(0, -1)] = w.id;
            if (w.word.endsWith('ed')) wordMap[base.slice(0, -2)] = w.id;
            if (w.word.endsWith('ing')) wordMap[base.slice(0, -3)] = w.id;
        });
        
        const renderedContent = article.content.split(/\s+/).map(token => {
            const clean = token.replace(/^[.,;:!?'"()[\]{}]+|[.,;:!?'"()[\]{}]+$/g, '');
            const lower = clean.toLowerCase();
            const wordId = wordMap[lower];
            
            if (wordId && clean.length > 2) {
                return `<span class="reading-word font-en font-semibold text-slate-900" onclick="app.showWordPopup('${wordId}', this)">${token}</span>`;
            }
            return `<span class="font-en text-slate-700">${token}</span>`;
        }).join(' ');
        
        return `
            <div class="fade-in grid md:grid-cols-4 gap-6">
                <div class="md:col-span-1 space-y-3">
                    <h3 class="font-bold text-slate-900 mb-3">文章目录</h3>
                    ${this.data.articles.map(a => `
                        <button onclick="app.readArticle('${a.id}')" 
                            class="w-full text-left p-3 rounded-lg text-sm transition ${a.id === articleId ? 'bg-slate-900 text-white' : 'bg-white hover:bg-slate-100 text-slate-700'}">
                            <div class="font-bold truncate">${a.title}</div>
                            <div class="text-xs ${a.id === articleId ? 'text-slate-400' : 'text-slate-500'} mt-1">${a.words.length} 词</div>
                        </button>
                    `).join('')}
                </div>
                
                <div class="md:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 md:p-10">
                        <h2 class="text-2xl font-bold text-slate-900 mb-2">${article.title}</h2>
                        <p class="text-sm text-slate-500 font-en mb-8 border-b border-slate-100 pb-4">${article.source}</p>
                        
                        <div class="prose prose-slate max-w-none leading-loose text-justify text-lg">
                            ${renderedContent}
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="word-popup" class="fixed inset-0 z-50 hidden" onclick="app.hideWordPopup(event)">
                <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-lg px-4">
                    <div id="word-popup-content" class="word-popover rounded-2xl shadow-2xl p-6 max-h-[80vh] overflow-y-auto">
                    </div>
                </div>
            </div>
        `;
    }

        const renderList = (items, title, colorClass) => items.length ? `

                    ${renderList(dueToday, '今日到期', 'bg-amber-500')}
                    ${renderList(upcoming, '即将到期', 'bg-green-500')}
                `}

        `;
    }
    
    getDueReviews() {
        const today = new Date();
        return this.data.words
            .filter(w => w.mastered && w.nextReview)
            .map(w => {
                const due = new Date(w.nextReview);
                const daysOverdue = daysDiff(today, due);
                return { word: w, daysOverdue };
            })
            .filter(r => r.daysOverdue >= -3);
    }

            el.style.left = Math.random() * 100 + 'vw';
            el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            el.style.animationDuration = (Math.random() * 2 + 2) + 's';
            el.style.animationDelay = (Math.random() * 0.5) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4500);
        }
    }

        const state = this.studyState;

        return `
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

                    <p class="text-slate-600 mb-6">

                        目前处于 <span class="font-bold text-amber-600">${cycleNames[state.cycle] || '未知'}</span>。

    navigate(view) {
        this.currentView = view;
        this.render();
    }
    
    startStudy(articleId, jumpToWordId = null) {
        this.currentArticleId = articleId;
        this.showContinueModal = false;
        
        const words = this.data.words.filter(w => w.articleId === articleId);
        const allMastered = words.length > 0 && words.every(w => w.mastered);
        
        if (allMastered) {
            words.forEach(w => {
                w.mastered = false;
                w.cycle = 0;
                w.reviewStage = 0;
                w.nextReview = null;
                w.wrongCount = 0;
            });
            this.data.stats.mastered -= words.length;
            this.data.stats.totalScore -= words.length * 3;
        }
        
        this.initStudyState(articleId, jumpToWordId);
        this.currentView = 'study';
        this.render();
    }
    
    initStudyState(articleId, jumpToWordId = null) {
        const words = this.data.words.filter(w => w.articleId === articleId && !w.mastered);
        let queue = words.map(w => w.id);
        
        if (jumpToWordId && queue.includes(jumpToWordId)) {
            queue = queue.filter(id => id !== jumpToWordId);
            queue.unshift(jumpToWordId);
        } else {
            queue = shuffle(queue);
        }
        
        this.studyState = {
            articleId,
            cycle: 1,
            queue,
            initialQueueLength: queue.length,
            mode: 'learning',
            currentWordId: queue[0],
            showHint: false,
            lastAnswer: null,
            lastAnswerCorrect: false,
            selectedOption: null,
            startTime: Date.now(),
            encouragement: shuffle([...CONFIG.ENCOURAGEMENTS])[0],
            isReview: false
        };
        
        this.data.studyState = this.studyState;
        StorageManager.save(this.data);
    }
    
    resumeStudy() {
        this.showContinueModal = false;
        this.currentArticleId = this.studyState.articleId;
        this.currentView = 'study';
        this.render();
    }
    
    abandonStudy() {
        this.studyState = null;
        this.data.studyState = null;
        StorageManager.save(this.data);
        this.showContinueModal = false;
        this.render();
    }
    
    quitStudy() {
        this.data.studyState = this.studyState;
        StorageManager.save(this.data);
        this.currentView = 'home';
        this.render();
    }
    
    toggleHint() {
        this.studyState.showHint = !this.studyState.showHint;
        this.render();
    }
    
    startTest() {
        this.studyState.mode = 'testing';
        this.studyState.showHint = false;
        this.studyState.lastAnswer = null;
        this.studyState.selectedOption = null;
        this.render();
    }
    
    answerTest(selectedOpt, index) {
        if (this.studyState.lastAnswer !== null) return;
        
        const state = this.studyState;
        const word = this.data.words.find(w => w.id === state.queue[0]);
        const isCorrect = selectedOpt === word.chineseDef;
        
        state.lastAnswer = selectedOpt;
        state.lastAnswerCorrect = isCorrect;
        state.selectedOption = selectedOpt;
        
        if (state.isReview) {
            if (isCorrect) {
                state.queue.shift();
                word.reviewStage = Math.min(word.reviewStage + 1, 5);
                word.nextReview = this.calcNextReview(word.reviewStage);
            } else {
                word.wrongCount++;
                const failed = state.queue.shift();
                state.queue.push(failed);
                word.reviewStage = 0;
                word.nextReview = this.calcNextReview(0);
            }
            StorageManager.save(this.data);
            this.render();
            return;
        }
        
        if (isCorrect) {
            state.queue.shift();
            
            if (state.cycle === 3) {
                word.mastered = true;
                word.cycle = 3;
                word.nextReview = this.calcNextReview(0);
                this.data.stats.mastered++;
                this.data.stats.totalScore += 3;
            } else {
                word.cycle = state.cycle;
            }
        } else {
            word.wrongCount++;
            const failed = state.queue.shift();
            state.queue.push(failed);
        }
        
        StorageManager.save(this.data);
        this.render();
    }
    
    nextWord() {
        const state = this.studyState;
        
        if (state.queue.length === 0) {
            if (state.isReview) {
                this.data.studyState = null;
                this.studyState = null;
                StorageManager.save(this.data);
                this.currentView = 'review';
                this.render();
                return;
            }
            
            if (state.cycle < 3) {
                this.advanceCycle();
            } else {
                this.completeList();
                return;
            }
        } else {
            state.mode = 'learning';
            state.showHint = false;
            state.lastAnswer = null;
            state.lastAnswerCorrect = false;
            state.selectedOption = null;
        }
        
        this.data.studyState = this.studyState;
        StorageManager.save(this.data);
        this.render();
    }
    
    advanceCycle() {
        const state = this.studyState;
        state.cycle++;
        
        const words = this.data.words.filter(w => w.articleId === state.articleId && !w.mastered);
        state.queue = shuffle(words.map(w => w.id));
        state.initialQueueLength = state.queue.length;
        state.mode = 'learning';
        state.showHint = false;
        state.lastAnswer = null;
        state.lastAnswerCorrect = false;
    }
    
    completeList() {
        const state = this.studyState;
        state.duration = Math.floor((Date.now() - state.startTime) / 1000);
        this.data.studyState = null;
        this.studyState = null;
        StorageManager.save(this.data);
        this.currentView = 'victory';
        this.render();
    }
    
    calcNextReview(stage) {
        const days = CONFIG.REVIEW_INTERVALS[stage] || 15;
        const d = new Date();
        d.setDate(d.getDate() + days);
        return d.toISOString();
    }
    
    readArticle(articleId) {
        this.currentArticleId = articleId;
        this.currentView = 'reading';
        this.render();
    }
    
    startReview(wordId) {
        const word = this.data.words.find(w => w.id === wordId);
        if (!word) return;
        
        this.studyState = {
            articleId: word.articleId,
            cycle: 3,
            queue: [wordId],
            initialQueueLength: 1,
            mode: 'testing',
            isReview: true,
            showHint: false,
            lastAnswer: null,
            lastAnswerCorrect: false,
            selectedOption: null
        };
        
        this.currentArticleId = word.articleId;
        this.currentView = 'study';
        this.render();
    }
    
    showNewArticleModal() {
        this.newArticleModalOpen = true;
        this.render();
    }
    
    closeNewArticleModal(event) {
        if (!event || event.target === event.currentTarget) {
            this.newArticleModalOpen = false;
            this.render();
        }
    }
    
    saveApiSettings() {
        const key = document.getElementById('api-key').value.trim();
        const model = document.getElementById('api-model').value;
        this.data.settings = { apiKey: key, apiModel: model };
        StorageManager.save(this.data);
        alert('设置已保存');
    }
    
    exportData() {

    }
    
    importData(input) {
        const file = input.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                StorageManager.importData(e.target.result);
                this.data = StorageManager.load();
                alert('导入成功！');
                this.navigate('home');
            } catch(err) {
                alert('导入失败: ' + err.message);
            }
        };
        reader.readAsText(file);
    }
    
    resetAll() {
        if (!confirm('确定要重置所有学习进度吗？此操作不可恢复。')) return;
        localStorage.removeItem(CONFIG.STORAGE_KEY);
        this.data = StorageManager.initDefault();
        this.studyState = null;
        this.render();
    }
    
    async analyzeWithAPI() {
        const title = document.getElementById('new-article-title').value.trim();
        const source = document.getElementById('new-article-source').value.trim();
        const text = document.getElementById('new-article-text').value.trim();
        const errorEl = document.getElementById('api-error');
        
        if (!title || !text) {
            errorEl.textContent = '请填写标题和原文';
            errorEl.classList.remove('hidden');
            return;
        }
        
        if (!this.data.settings.apiKey) {
            errorEl.textContent = '请先在设置中配置 DeepSeek API Key';
            errorEl.classList.remove('hidden');
            return;
        }
        
        errorEl.classList.add('hidden');
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="animate-spin">⏳</span> 分析中...';
        btn.disabled = true;
        
        try {
            const prompt = `Analyze the following academic text and extract 30-40 core vocabulary words suitable for postgraduate entrance exam (考研英语一) level. 
For each word, provide JSON with: word, root (etymology breakdown), englishDef (English definition, academic and precise), chineseDef (Chinese definition), obscureMeaning (less common meanings if any, otherwise empty string), exampleSentence (authentic sentence from the text or in academic style).
Prioritize: academic high-frequency words, words with obvious roots/affixes, and words with obscure meanings.
Return format: pure JSON array without markdown code blocks.
Text: ${text}`;
            
            const response = await fetch(CONFIG.API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${this.data.settings.apiKey}`
                },
                body: JSON.stringify({
                    model: this.data.settings.apiModel,
                    messages: [
                        {role: 'system', content: 'You are an academic vocabulary extraction engine. Return only valid JSON array.'},
                        {role: 'user', content: prompt}
                    ],
                    temperature: 0.3
                })
            });
            
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            
            const result = await response.json();
            let content = result.choices[0].message.content;
            
            content = content.replace(/```json\\n?/g, '').replace(/```\\n?/g, '').trim();
            const words = JSON.parse(content);
            
            if (!Array.isArray(words) || words.length < 5) throw new Error('Invalid word data');
            
            this.createArticleFromData(title, source, text, words);
            
        } catch(err) {
            console.error(err);
            errorEl.textContent = 'API 调用失败: ' + err.message + '。请检查 API Key 和网络，或尝试手动导入。';
            errorEl.classList.remove('hidden');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
    
    createArticleFromData(title, source, text, wordsData) {
        const id = 'custom_' + generateId();
        const article = {
            id,
            title,
            source: source || 'User uploaded text',
            dateAdded: todayStr(),
            content: text,
            words: wordsData.map((wd, i) => ({
                id: `${id}_w${i}`,
                word: wd.word,
                root: wd.root || 'Unknown etymology',
                englishDef: wd.englishDef || wd.english || '',
                chineseDef: wd.chineseDef || wd.chinese || '',
                obscureMeaning: wd.obscureMeaning || wd.obscure || '',
                exampleSentence: wd.exampleSentence || wd.example || '',
                cycle: 0, mastered: false, reviewStage: 0,
                nextReview: null, wrongCount: 0, articleId: id
            }))
        };
        
        this.data.articles.push(article);
        this.data.words.push(...article.words);
        StorageManager.save(this.data);
        
        this.newArticleModalOpen = false;
        this.currentView = 'home';
        this.render();
    }
    
    manualImport() {
        const text = document.getElementById('new-article-text').value.trim();
        const title = document.getElementById('new-article-title').value.trim();
        const errorEl = document.getElementById('api-error');
        
        try {
            const data = JSON.parse(text);
            if (data.words && Array.isArray(data.words)) {
                this.createArticleFromData(title, 'Manual import', text, data.words);
            } else if (Array.isArray(data)) {
                this.createArticleFromData(title, 'Manual import', text, data);
            } else {
                throw new Error('Format should be array of word objects');
            }
        } catch(e) {
            errorEl.textContent = '手动导入失败: ' + e.message + '。请提供正确的 JSON 数组格式。';
            errorEl.classList.remove('hidden');
        }
    }
    
    attachGlobalListeners() {
        document.addEventListener('keydown', (e) => {
            if (this.currentView === 'study' && this.studyState?.mode === 'testing') {
                if (e.key >= '1' && e.key <= '4') {
                    const idx = parseInt(e.key) - 1;
                    const btn = document.getElementById(`opt-${idx}`);
                    if (btn && !btn.disabled) btn.click();
                }
            }
        });
    }
}
